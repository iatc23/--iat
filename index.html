  <style>

    #modal-overlay:not(.hidden), #group-overlay:not(.hidden), #csv-overlay:not(.hidden), #time-slots-overlay:not(.hidden), #schedule-form-overlay:not(.hidden), #tugas-overlay:not(.hidden), #matkul-overlay:not(.hidden) { animation: overlayFade 0.18s ease both; }

    @keyframes fullModalIn {

      to { opacity: 1; transform: translateY(0); }

    .kc-full-modal {
      position: fixed !important;
      inset: 0 !important;
      left: 0 !important;

      transform: none !important;
      width: 100vw !important;

    }
    .kc-full-modal:not(.hidden) { animation: fullModalIn 0.22s cubic-bezier(.2,.8,.2,1) both !important; }
    .kc-full-modal > .flex:first-child {
      position: sticky;

    .kc-full-modal .form-actions {

    .kc-body-modal[id$="-overlay"], #modal-overlay.kc-body-modal {

        margin: 18px max(-32px, calc((760px - 100vw) / 2)) -32px;

    }
    #page-content .bg-white.rounded-xl, #page-content .bg-white.rounded-2xl, #page-content .rounded-xl.bg-white, #page-content .rounded-2xl.bg-white {
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background-color 0.22s ease;
    }
    #page-content .bg-white.rounded-xl:hover, #page-content .bg-white.rounded-2xl:hover, #page-content .rounded-xl.bg-white:hover, #page-content .rounded-2xl.bg-white:hover {

    aside button, nav button, header button, #page-content button {

    aside button:active, nav button:active, header button:active, #page-content button:active { transform: scale(0.98); }
    input, select, textarea { transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease; }


    /* Fix mobile profile dropdown + dashboard WA MK modal layering */
    #profile-menu {
      max-height: calc(100dvh - 120px);

    @media (max-width: 767px) {

      position: fixed !important;
      left: 50% !important;

      transform: translate(-50%, -50%) !important;

      max-height: min(70dvh, 520px) !important;
      overflow-y: auto !important;
      z-index: 10001 !important;

      from { opacity: 0; transform: translate(-50%, -47%) scale(.96); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    /* Loading Overlay Animation */
    .loader-dots div { animation-timing-function: cubic-bezier(0, 1, 1, 0); }
    .loader-dots div:nth-child(1) { left: 8px; animation: loader-dots1 0.6s infinite; }
    .loader-dots div:nth-child(2) { left: 8px; animation: loader-dots2 0.6s infinite; }
    .loader-dots div:nth-child(3) { left: 32px; animation: loader-dots2 0.6s infinite; }
    .loader-dots div:nth-child(4) { left: 56px; animation: loader-dots3 0.6s infinite; }
    @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    @keyframes loader-dots3 { 0% { transform: scale(1); } 100% { transform: scale(0); } }
    @keyframes loader-dots2 { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, 0); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
      .soft-reveal { opacity: 1 !important; }
    }
  </style>

 <body class="h-full bg-pastel-light">
  
  <!-- Loading Overlay -->
  <div id="global-loading" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[99999] flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="loader-dots relative w-20 h-5 mb-4">
      <div class="absolute top-0 w-3 h-3 rounded-full bg-purple-500"></div>
      <div class="absolute top-0 w-3 h-3 rounded-full bg-purple-500"></div>
      <div class="absolute top-0 w-3 h-3 rounded-full bg-purple-500"></div>
      <div class="absolute top-0 w-3 h-3 rounded-full bg-purple-500"></div>
    </div>
    <p class="text-sm font-semibold text-gray-600 animate-pulse">Menghubungkan ke Database...</p>
  </div>

  <div id="app"></div>

  <script>
    // =========================================================================
    // KONFIGURASI GOOGLE APPS SCRIPT (GAS)
    // =========================================================================
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxlMjkV-XtVk-nwLZpfiN4G6LJWVX3tREozTyN8k07D3suAdOnn567-MYqwqC-7tsINYQ/exec'; 
    // =========================================================================

    let isSyncing = false;
    let lastLocalUpdate = 0;

    // Fungsi wrapper untuk menggantikan localStorage.setItem ke DB Global
    function setAppStorage(key, value) {
      // 1. Simpan di local agar UI tetap instan (Optimistic UI)
      localStorage.setItem(key, value);
      lastLocalUpdate = Date.now(); // Catat waktu update lokal terakhir

      // 2. Jangan sinkronisasi sesi user (agar login tetap di device masing2) dan foto profil (terlalu besar)
      const excludeKeys = ['kelascircle_user', 'kelascircle_profile_photos', 'kelascircle_clean_starter_version', 'kelascircle_presentation_done'];
      if (excludeKeys.includes(key)) return;

      // 3. Kirim ke Google Sheets di background (tanpa menunggu response)
      if (GAS_URL && GAS_URL.startsWith('https://script.google.com/')) {
        isSyncing = true;
        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ key: key, value: value })
        }).then(() => {
          isSyncing = false;
        }).catch(err => {
          console.log('Gagal sync ke cloud (background):', err);
          isSyncing = false;
        });
      }
    }

    // Fungsi untuk memuat semua data dari Google Sheets
    async function fetchDatabaseFromGAS(isSilent = false) {
      if (!GAS_URL || !GAS_URL.startsWith('https://script.google.com/')) {
        if (!isSilent) console.warn("GAS_URL belum diatur. Berjalan dalam mode offline/local.");
        return;
      }

      // Cegah penimpaan jika user sedang mengirim data, atau baru saja merubah data (< 5 detik)
      if (isSyncing || (Date.now() - lastLocalUpdate < 5000)) return; 
      
      try {
        const response = await fetch(`${GAS_URL}?action=getAll`);
        const serverData = await response.json();
        
        let hasChanges = false;
        // Update localStorage dengan data terbaru dari server
        for (const key in serverData) {
          if (serverData[key] && serverData[key] !== localStorage.getItem(key)) {
            localStorage.setItem(key, serverData[key]);
            hasChanges = true;
          }
        }
        
        if (hasChanges && isSilent) {
           // Segarkan variabel memory utama
           USERS = getUsersData();
           matkulData = getMatkulData();
           initGroupsData();
           initScheduleData();
           initTugasData();
           
           // Hanya auto-render ulang jika user TIDAK sedang membuka Form/Modal
           // Ini untuk mencegah inputan yang sedang diketik user hilang
           const hasOpenModal = document.querySelectorAll('.kc-full-modal:not(.hidden), .kc-body-modal:not(.hidden)').length > 0;
           if (!hasOpenModal && getUser()) {
             renderPage(getUser());
           }
        }

        if (!isSilent) console.log("Database berhasil disinkronkan dengan Google Sheets.");
      } catch (error) {
        console.error("Gagal menarik data dari server:", error);
      }
    }

    // Interval Auto-Sync ke server setiap 10 detik agar realtime
    setInterval(() => {
      fetchDatabaseFromGAS(true);
    }, 10000);


    const DEFAULT_USERS = [
      { name: 'Amir', username: 'amir', password: '123', role: 'Admin Utama', photo: '' }
    ];

    const CLEAN_STARTER_VERSION = 'clean-admin-only-v2-fullscreen';
    function ensureCleanStarterData() {
      const currentVersion = localStorage.getItem('kelascircle_clean_starter_version');
      if (currentVersion === CLEAN_STARTER_VERSION) return;
      localStorage.setItem('kelascircle_users', JSON.stringify(DEFAULT_USERS.map(u => ({ ...u }))));
      localStorage.setItem('kelascircle_matkul', JSON.stringify([]));
      localStorage.setItem('kelascircle_groups', JSON.stringify({}));
      localStorage.setItem('kelascircle_schedule', JSON.stringify([]));
      localStorage.setItem('kelascircle_tugas', JSON.stringify([]));
      localStorage.removeItem('kelascircle_user');
      localStorage.setItem('kelascircle_clean_starter_version', CLEAN_STARTER_VERSION);
      // Jika baru pertama reset, paksa simpan ke server juga
      setAppStorage('kelascircle_users', JSON.stringify(DEFAULT_USERS.map(u => ({ ...u }))));
      setAppStorage('kelascircle_matkul', JSON.stringify([]));
      setAppStorage('kelascircle_groups', JSON.stringify({}));
      setAppStorage('kelascircle_schedule', JSON.stringify([]));
      setAppStorage('kelascircle_tugas', JSON.stringify([]));
    }

    function getUsersData() {
      try {
        const stored = JSON.parse(localStorage.getItem('kelascircle_users') || 'null');
        if (Array.isArray(stored) && stored.length > 0) return stored;
      } catch (error) {}
      return DEFAULT_USERS.map(u => ({ ...u }));
    }

    let USERS = [];

    function saveUsersData() {
      setAppStorage('kelascircle_users', JSON.stringify(USERS));
    }

    function updateCurrentUserFromMaster(username) {
      const current = getUser();
      if (!current) return;
      const targetUsername = username || current.username;
      const master = USERS.find(u => u.username === targetUsername || u.username === current.username);
      if (!master) return;
      const freshUser = { ...master, photo: isCustomProfilePhoto(master.photo) ? master.photo : '' };
      localStorage.setItem('kelascircle_user', JSON.stringify(freshUser));
    }

    let currentPage = 'dashboard';
    let currentDateTime = '';
    const app = document.getElementById('app');
    const LOGO_URL = 'https://cdn.phototourl.com/free/2026-05-07-bc12d161-a65d-4172-8b65-d3aa2b6cccfb.jpg';
    const EMPTY_PROFILE_PHOTO = 'https://cdn.phototourl.com/free/2026-05-07-9592f8fd-c22c-4811-bc71-8f1373d5bd4e.jpg';

    function getProfilePhotos() {
      try {
        return JSON.parse(localStorage.getItem('kelascircle_profile_photos') || '{}');
      } catch (error) {
        return {};
      }
    }

    function isCustomProfilePhoto(src) {
      return !!src && src !== EMPTY_PROFILE_PHOTO && String(src).startsWith('data:image/');
    }

    function getProfilePhoto(user) {
      if (!user) return EMPTY_PROFILE_PHOTO;
      const photos = getProfilePhotos();
      if (isCustomProfilePhoto(photos[user.username])) return photos[user.username];
      if (isCustomProfilePhoto(user.photo)) return user.photo;
      return EMPTY_PROFILE_PHOTO;
    }

    function saveProfilePhoto(username, base64) {
      const photos = getProfilePhotos();
      if (base64) {
        photos[username] = base64;
      } else {
        delete photos[username];
      }
      localStorage.setItem('kelascircle_profile_photos', JSON.stringify(photos));
    }

    function updateProfilePhotoUI(src) {
      const finalSrc = src || EMPTY_PROFILE_PHOTO;
      ['header-profile-photo', 'profile-photo-modal'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.src = finalSrc;
      });
    }

    function resizeProfilePhoto(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type.startsWith('image/')) {
          reject(new Error('File harus berupa gambar'));
          return;
        }
        const reader = new FileReader();
        reader.onerror = () => reject(new Error('Gagal membaca file'));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => resolve(reader.result);
          img.onload = () => {
            const maxSize = 520;
            let { width, height } = img;
            if (width > height && width > maxSize) {
              height = Math.round(height * maxSize / width);
              width = maxSize;
            } else if (height >= width && height > maxSize) {
              width = Math.round(width * maxSize / height);
              height = maxSize;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function updateDateTime() {
      const now = new Date();
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      const day = days[now.getDay()];
      const date = String(now.getDate()).padStart(2, '0');
      const month = months[now.getMonth()];
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const dateStr = `${day}, ${date} ${month} ${year}`;
      const timeStr = `pukul ${hours}.${minutes} WIB`;
      
      const dtElements = document.querySelectorAll('[data-datetime-date]');
      dtElements.forEach(el => {
        if (el.textContent !== dateStr) {
          el.textContent = dateStr;
        }
      });
      
      const timeElements = document.querySelectorAll('[data-datetime-time]');
      timeElements.forEach(el => {
        if (el.textContent !== timeStr) {
          el.textContent = timeStr;
        }
      });
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    const defaultConfig = {
      app_title: 'فصل IAT C 23',
      app_subtitle: 'Portal Manajemen Kelas',
      home_title: 'IAT Cemara 2023',
      background_color: '#f0f4ff',
      surface_color: '#ffffff',
      text_color: '#1e293b',
      primary_action: '#7c6bc4',
      secondary_action: '#5ba89d',
      whatsapp_class: '',
      youtube_class: '',
      material_link: '',
      other_link: '',
      other_label: 'Lainnya',
      whatsapp_mk: {},
      rps_mk: {}
    };

    function getAppConfig() {
      let storedConfig = {};
      try {
        storedConfig = JSON.parse(localStorage.getItem('kelascircle_app_config') || '{}');
      } catch (error) {
        storedConfig = {};
      }
      return { ...defaultConfig, ...storedConfig };
    }

    function saveClassSettings() {
      const currentConfig = getAppConfig();
      const appTitle = document.getElementById('class-name-input')?.value.trim();
      const appSubtitle = document.getElementById('class-slogan-input')?.value.trim();
      const whatsappClass = document.getElementById('social-wa-class-input')?.value.trim() || '';
      const youtubeClass = document.getElementById('social-youtube-input')?.value.trim() || '';
      const materialLink = document.getElementById('social-material-input')?.value.trim() || '';
      const otherLabel = document.getElementById('social-other-label-input')?.value.trim() || 'Lainnya';
      const otherLink = document.getElementById('social-other-link-input')?.value.trim() || '';

      if (!appTitle || !appSubtitle) {
        showToast('⚠️ Isi Nama Kelas dan Slogan Kelas');
        return;
      }

      const whatsappMk = { ...(currentConfig.whatsapp_mk || {}) };
      const rpsMk = { ...(currentConfig.rps_mk || {}) };
      matkulData.forEach((mk) => {
        whatsappMk[mk.id] = document.getElementById(`social-wa-mk-${mk.id}`)?.value.trim() || '';
        rpsMk[mk.id] = document.getElementById(`social-rps-mk-${mk.id}`)?.value.trim() || '';
      });

      setAppStorage('kelascircle_app_config', JSON.stringify({
        app_title: appTitle,
        app_subtitle: appSubtitle,
        whatsapp_class: whatsappClass,
        youtube_class: youtubeClass,
        material_link: materialLink,
        other_label: otherLabel,
        other_link: otherLink,
        whatsapp_mk: whatsappMk,
        rps_mk: rpsMk
      }));
      showToast('Setting berhasil disimpan');
      renderPage(getUser());
    }

    function getUser() {
      const d = localStorage.getItem('kelascircle_user');
      return d ? JSON.parse(d) : null;
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast-show fixed top-4 left-1/2 -translate-x-1/2 z-[100000] bg-white shadow-lg rounded-xl px-5 py-3 text-sm font-medium text-green-700 border border-green-200';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function isAdmin(user) {
      return user.role === 'Admin Utama' || user.role === 'Admin Tambahan';
    }

    function renderLogin() {
      const config = getAppConfig();
      app.innerHTML = `
        <div class="min-h-full flex items-center justify-center p-6" style="background: linear-gradient(135deg, #e8d5f5 0%, #d4e8f0 50%, #d5f0e8 100%);">
          <div class="w-full max-w-sm bg-white/90 backdrop-blur rounded-3xl shadow-xl p-8 text-center">
            <img src="${LOGO_URL}" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover shadow-md border-4 border-white" onerror="this.style.background='linear-gradient(135deg,#c4b7d4,#b8d4e3)';this.alt='Logo';">
            <h1 class="text-2xl font-bold text-gray-800" id="login-title">${config.app_title}</h1>

    let activeTab = 'pribadi';
    let expandedMatkul = null;
    let groupsData = {};
    let scheduleData = [];
    let editingScheduleId = null;
    let tugasData = [];
    let editingTugasId = null;
    let activeTugasTab = 'Belum';

    function getMatkulData() {
      try {
        const stored = JSON.parse(localStorage.getItem('kelascircle_matkul') || '[]');
        if (Array.isArray(stored)) return stored;
      } catch (error) {}
      return [];
    }

    let matkulData = [];
    let editingMatkulId = null;

    function migrateMatkulData() {
      let changed = false;
      matkulData = (Array.isArray(matkulData) ? matkulData : []).filter(mk => mk && mk.id && mk.name).map((mk) => {
        const next = { ...mk };
        if (next.dayOfWeek === undefined || next.dayOfWeek === null || next.dayOfWeek === '') {
          next.dayOfWeek = Number(next.dayIndex ?? next.day ?? 1) || 1;
          changed = true;
        }
        if (!next.startTime) {
          next.startTime = toDotTime(normalizeTimeForInput(next.time || '08.00', '08:00'));
          changed = true;
        }
        if (!next.endTime) {
          const rawTime = String(next.time || '');
          if (rawTime.includes('-')) next.endTime = toDotTime(normalizeTimeForInput(rawTime.split('-')[1], '10:00'));
          else next.endTime = '10.00';
          changed = true;
        }
        const expectedTime = `${next.startTime} - ${next.endTime}`;
        if (next.time !== expectedTime) {
          next.time = expectedTime;
          changed = true;
        }
        return next;
      });
      if (changed) saveMatkulData();
    }

    function saveMatkulData() {
      setAppStorage('kelascircle_matkul', JSON.stringify(matkulData));
    }


    function normalizeTimeForInput(value, fallback = '08:00') {
      const raw = String(value || '').trim();
      if (!raw) return fallback;
      const first = raw.split('-')[0].trim().replace('.', ':');
      if (/^\d{1,2}:\d{2}$/.test(first)) {
        const [h, m] = first.split(':');
        return `${String(h).padStart(2, '0')}:${m}`;
      }
      return fallback;
    }

    function toDotTime(value) {
      return String(value || '').trim().replace(':', '.');
    }

    function getMatkulTime(matkulOrId) {
      const mk = typeof matkulOrId === 'string' ? matkulData.find(m => m.id === matkulOrId) : matkulOrId;
      if (!mk) return '-';
      if (mk.startTime && mk.endTime) return `${mk.startTime} - ${mk.endTime}`;
      if (mk.time && String(mk.time).includes('-')) return mk.time;
      if (mk.time && mk.endTime) return `${mk.time} - ${mk.endTime}`;
      return mk.time || '-';
    }

    function slugifyMatkulName(name) {
      const base = String(name || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || `mk-${Date.now()}`;
      let id = base;
      let counter = 2;
      while (matkulData.some(m => m.id === id && m.id !== editingMatkulId)) {
        id = `${base}-${counter++}`;
      }
      return id;
    }

    const daysOfWeek = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

    function initGroupsData() {
      const stored = localStorage.getItem('kelascircle_groups');
      if (!stored) {
        groupsData = {};
        setAppStorage('kelascircle_groups', JSON.stringify(groupsData));
      } else {
        try {
          groupsData = JSON.parse(stored) || {};
        } catch (error) {
          groupsData = {};
          setAppStorage('kelascircle_groups', JSON.stringify(groupsData));
        }
      }
    }

    function initScheduleData() {
      const stored = localStorage.getItem('kelascircle_schedule');
      if (!stored) {
        scheduleData = [];
        setAppStorage('kelascircle_schedule', JSON.stringify(scheduleData));
      } else {
        try {
          const parsed = JSON.parse(stored);
          scheduleData = Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          scheduleData = [];
        }
      }
    }

    function initTugasData() {
      const stored = localStorage.getItem('kelascircle_tugas');
      if (!stored) {
        tugasData = [];
        setAppStorage('kelascircle_tugas', JSON.stringify(tugasData));
      } else {
        tugasData = JSON.parse(stored);
      }
    }

    function formatDateInputToReadable(dateStr) {
      if (!dateStr || dateStr.trim() === '') return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      return `${days[date.getDay()]}, ${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>'"]/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }


    function formatUsernameLabel(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      return raw
        .split(/[._\-\s]+/)
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1).toLowerCase())
        .join(' ');
    }

    function findUserByAnyValue(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (!raw) return null;
      return USERS.find(u => {
        const username = String(u.username || '').trim().toLowerCase();
        const name = String(u.name || '').trim().toLowerCase();
        const usernameLabel = formatUsernameLabel(u.username).toLowerCase();
        return raw === username || raw === name || raw === usernameLabel;
      }) || null;
    }

    function normalizeUserIdentifier(value) {
      const found = findUserByAnyValue(value);
      return found ? String(found.username || '').trim().toLowerCase() : String(value || '').trim().toLowerCase();
    }

    function getUserDisplay(value) {
      const found = findUserByAnyValue(value);
      const username = found ? found.username : value;
      return formatUsernameLabel(username || value);
    }

    function formatUserList(values) {
      if (!Array.isArray(values)) return '';
      return values.map(getUserDisplay).filter(Boolean).join(', ');
    }

    function formatUserPills(values) {
      if (!Array.isArray(values)) return '';
      const names = values.map(getUserDisplay).filter(Boolean);
      if (!names.length) return '<span class="inline-flex items-center rounded-full bg-gray-100 text-gray-400 px-2 py-0.5 text-xs font-medium">-</span>';
      return names.map(name => `<span class="inline-flex items-center rounded-full bg-gray-100 text-gray-600 px-2 py-0.5 text-xs font-medium">${escapeHtml(name)}</span>`).join('');
    }

    function isSameUserValue(a, b) {
      return normalizeUserIdentifier(a) === normalizeUserIdentifier(b);
    }

    function isUserInMembers(members, user) {
      if (!Array.isArray(members) || !user) return false;
      return members.some(member => isSameUserValue(member, user.username) || isSameUserValue(member, user.name));
    }

    function normalizeLink(link) {
      const value = (link || '').trim();
      if (!value) return '';
      if (/^https?:\/\//i.test(value)) return value;
      return 'https://' + value;
    }

    function formatDateWithDay(dateStr) {
      if (!dateStr || dateStr.trim() === '') return '';
      const date = new Date(dateStr);
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      const dayName = days[date.getDay()];
      return `${dayName}, ${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function addDays(dateStr, days) {
      const date = new Date(dateStr);
      date.setDate(date.getDate() + days);
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      return `${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function toggleMatkul(matkulId) {
      expandedMatkul = expandedMatkul === matkulId ? null : matkulId;
      renderPage(getUser());
    }

    function updateGroupStatus(matkulId, groupId, status) {
      if (groupsData[matkulId]) {
        const group = groupsData[matkulId].find(g => g.id === groupId);
        if (group) {
          group.status = status;
          if (status === 'Selesai') {
            const groupIndex = groupsData[matkulId].findIndex(g => g.id === groupId);
            if (groupIndex < groupsData[matkulId].length - 1) {
              const nextGroup = groupsData[matkulId][groupIndex + 1];
              if (!nextGroup.date || nextGroup.date.trim() === '') {
                nextGroup.date = addDays(group.date, 7);
                showToast('Kelompok berikutnya otomatis dijadwalkan minggu depan');
              }
            }
          }
          setAppStorage('kelascircle_groups', JSON.stringify(groupsData));
          if (status === 'Selesai') {
            const doneMap = getPresentationDoneMap();
            doneMap[getPresentationReminderKey(matkulId, groupId)] = { done: true, doneAt: new Date().toISOString(), source: 'group-status' };
            savePresentationDoneMap(doneMap);
          }
          renderPage(getUser());
          showToast('Status presentasi berhasil diperbarui');
        }
      }
    }


    function getTodayName() {
      return daysOfWeek[new Date().getDay()];
    }

    function getScheduleOverride(matkulId) {
      if (!Array.isArray(scheduleData)) scheduleData = [];
      return scheduleData.find(item => item && item.matkul === matkulId) || null;
    }

    function getAutoScheduleData() {
      matkulData = getMatkulData();
      migrateMatkulData();
      return (Array.isArray(matkulData) ? matkulData : [])
        .filter((mk) => mk && mk.id && mk.name)
        .map((mk) => {
          const rawDay = Number(mk.dayOfWeek);
          const dayIndex = Number.isFinite(rawDay) ? Math.max(0, Math.min(6, rawDay)) : 1;
          const override = getScheduleOverride(mk.id) || {};
          return {
            id: mk.id,
            matkul: mk.id,
            day: daysOfWeek[dayIndex] || 'Senin',
            dayIndex,
            time: getMatkulTime(mk),
            pj1: override.pj1 || '',
            pj2: override.pj2 || ''
          };
        })
        .sort((a, b) => (a.dayIndex - b.dayIndex) || String(a.time || '').localeCompare(String(b.time || '')));
    }

    function getTodaySchedules() {
      const today = getTodayName();
      return getAutoScheduleData()
        .filter(item => item.day === today)
        .slice()
        .sort((a, b) => String(a.time || '').localeCompare(String(b.time || '')));
    }

    function isTugasDoneForUser(tugas, user = getUser()) {
      const username = user?.username;
      if (!username || !tugas) return false;
      if (Array.isArray(tugas.doneBy)) return tugas.doneBy.includes(username);
      return tugas.status === 'Selesai';
    }

    function getTugasStatusForUser(tugas, user = getUser()) {
      return isTugasDoneForUser(tugas, user) ? 'Selesai' : 'Belum';
    }

    function getUpcomingDeadlines(daysAhead = 7) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const limit = new Date(today);
      limit.setDate(limit.getDate() + daysAhead);

      const currentUser = getUser();
      return (tugasData || [])
        .filter((item) => !isTugasDoneForUser(item, currentUser) && item.deadline)
        .map((item) => ({ ...item, deadlineDate: new Date(`${item.deadline}T00:00:00`) }))
        .filter((item) => item.deadlineDate >= today && item.deadlineDate <= limit)
        .sort((a, b) => a.deadlineDate - b.deadlineDate);
    }

    function getDeadlineBadge(deadline) {
      if (!deadline) return '';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const due = new Date(`${deadline}T00:00:00`);
      const diff = Math.round((due - today) / 86400000);
      if (diff === 0) return 'Hari ini';
      if (diff === 1) return 'Besok';
      return `${diff} hari lagi`;
    }


    function jsString(value) {
      return String(value ?? '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\r?\n/g, ' ');
    }

    function parseFlexibleDate(dateStr) {
      const raw = String(dateStr || '').trim();
      if (!raw) return null;

      if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        const date = new Date(`${raw}T00:00:00`);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      const cleaned = raw.replace(/^[A-Za-zÀ-ÿ]+,\s*/i, '').trim();
      const months = {
        januari: 0, februari: 1, maret: 2, april: 3, mei: 4, juni: 5,
        juli: 6, agustus: 7, september: 8, oktober: 9, november: 10, desember: 11
      };
      const match = cleaned.match(/^(\d{1,2})\s+([A-Za-zÀ-ÿ]+)\s+(\d{4})$/i);
      if (match) {
        const day = Number(match[1]);
        const month = months[match[2].toLowerCase()];
        const year = Number(match[3]);
        if (month !== undefined) {
          const date = new Date(year, month, day);
          return Number.isNaN(date.getTime()) ? null : date;
        }
      }

      const fallback = new Date(raw);
      if (!Number.isNaN(fallback.getTime())) {
        fallback.setHours(0, 0, 0, 0);
        return fallback;
      }
      return null;
    }

    function formatReminderDate(date) {
      if (!date || Number.isNaN(date.getTime())) return '';
      const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      return `${days[date.getDay()]}, ${String(date.getDate()).padStart(2, '0')} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function getPresentationDoneMap() {
      try {
        return JSON.parse(localStorage.getItem('kelascircle_presentation_done') || '{}') || {};
      } catch (error) {
        return {};
      }
    }

    function savePresentationDoneMap(map) {
      // Local only for personal reminder dismissals
      localStorage.setItem('kelascircle_presentation_done', JSON.stringify(map || {}));
    }

    function getPresentationReminderKey(matkulId, groupId) {
      return `${matkulId}:${groupId}`;
    }

    let presentationReminderDismissedMap = {};

    function getPresentationReminderItems(user = getUser()) {
      if (!user) return [];
      const doneMap = getPresentationDoneMap();
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const targetDays = new Set([7, 3, 2, 1]);
      const items = [];

      (matkulData || []).forEach((matkul) => {
        const groups = groupsData?.[matkul.id] || [];
        groups.forEach((group) => {
          if (!group || !isUserInMembers(group.members, user)) return;
          if (String(group.status || '').toLowerCase() === 'selesai') return;

          const key = getPresentationReminderKey(matkul.id, group.id);
          if (doneMap[key]) return;

          const date = parseFlexibleDate(group.date);
          if (!date) return;
          date.setHours(0, 0, 0, 0);
          const diff = Math.round((date - today) / 86400000);
          if (!targetDays.has(diff)) return;

          items.push({
            key,
            matkulId: matkul.id,
            matkulName: matkul.name,
            groupId: group.id,
            groupName: group.name || 'Kelompok',
            topic: group.topic || matkul.name,
            date,
            diff
          });
        });
      });

      return items.sort((a, b) => (a.diff - b.diff) || (a.date - b.date));
    }

    function markPresentationReminderDone(matkulId, groupId) {
      const key = getPresentationReminderKey(matkulId, groupId);
      const doneMap = getPresentationDoneMap();
      doneMap[key] = {
        done: true,
        doneAt: new Date().toISOString()
      };
      savePresentationDoneMap(doneMap);
      presentationReminderDismissedMap[key] = true;
      removePresentationReminderFloat();
      showToast('✅ Pengingat presentasi ditandai sudah dikerjakan');
      renderPage(getUser());
    }

    function markPresentationReminderPending(matkulId, groupId) {
      const key = getPresentationReminderKey(matkulId, groupId);
      presentationReminderDismissedMap[key] = true;
      removePresentationReminderFloat();
      showToast('❌ Pengingat tetap aktif sampai ditandai sudah dikerjakan');
    }

    function removePresentationReminderFloat() {
      const el = document.getElementById('presentation-reminder-float');
      if (el) el.remove();
    }

    function renderPresentationReminderFloat() {
      removePresentationReminderFloat();
      const user = getUser();
      if (!user) return;
      const allItems = getPresentationReminderItems(user);
      const items = allItems.filter(item => !presentationReminderDismissedMap[item.key]);
      if (!items.length) return;
      const item = items[0];
      const extraCount = items.length - 1;
      const box = document.createElement('div');
      box.id = 'presentation-reminder-float';
      box.className = 'fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/20 backdrop-blur-[2px] animate-in fade-in duration-200';
      box.onclick = (event) => {
        if (event.target === box) {
          presentationReminderDismissedMap[item.key] = true;
          removePresentationReminderFloat();
        }
      };
      box.innerHTML = `
        <div class="w-full max-w-sm bg-white/95 rounded-2xl shadow-2xl border border-purple-100 overflow-hidden animate-in zoom-in-95 duration-200" onclick="event.stopPropagation()">
          <div class="px-4 py-3 bg-gradient-to-r from-purple-50 to-blue-50 border-b border-purple-100 flex items-center justify-between gap-3">
            <div class="min-w-0">
              <p class="text-xs font-bold text-purple-700">Deadline Presentasi</p>
              <p class="text-[10px] text-gray-400">H-${item.diff}${extraCount > 0 ? ` · +${extraCount} lainnya` : ''}</p>
            </div>
            <div class="w-8 h-8 rounded-xl bg-white text-purple-600 flex items-center justify-center shadow-sm flex-shrink-0"><i data-lucide="bell-ring" style="width:16px;height:16px"></i></div>
          </div>
          <div class="p-4">
            <p class="text-sm font-bold text-gray-800 leading-snug">${escapeHtml(item.topic)} · ${escapeHtml(item.groupName)}</p>
            <div class="flex items-center gap-2 mt-1 flex-wrap">
              <p class="text-xs text-gray-500">${formatReminderDate(item.date)}</p>
              <button onclick="openPresentationDetail('${jsString(item.matkulId)}', '${jsString(item.groupId)}')" class="px-2 py-0.5 rounded-full bg-purple-50 text-purple-600 text-[10px] font-bold hover:bg-purple-100 transition">Lihat Detail</button>
            </div>
            <div class="grid grid-cols-2 gap-2 mt-3">
              <button onclick="markPresentationReminderDone('${jsString(item.matkulId)}', '${jsString(item.groupId)}')" class="w-full px-3 py-2 rounded-xl bg-green-50 text-green-600 text-xs font-bold hover:bg-green-100 transition">✅ Sudah</button>
              <button onclick="markPresentationReminderPending('${jsString(item.matkulId)}', '${jsString(item.groupId)}')" class="w-full px-3 py-2 rounded-xl bg-red-50 text-red-500 text-xs font-bold hover:bg-red-100 transition">❌ Belum</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(box);
      window.lucide?.createIcons?.();
    }

    let focusReminderGroupKey = null;

    function openPresentationDetail(matkulId, groupId) {
      focusReminderGroupKey = getPresentationReminderKey(matkulId, groupId);
      activeTab = 'pribadi';
      currentPage = 'kelompok';
      renderApp();
      setTimeout(() => {
        const target = document.querySelector(`[data-reminder-group="${CSS.escape(focusReminderGroupKey)}"]`);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.classList.add('ring-2', 'ring-purple-200', 'bg-purple-50');
          setTimeout(() => target.classList.remove('ring-2', 'ring-purple-200', 'bg-purple-50'), 1800);
        }
      }, 120);
    }

    function openExternalUrl(url) {
      const href = normalizeLink(url);
      if (!href) return;
      try {
        window.open(href, '_blank', 'noopener');
      } catch (e) {
        window.location.href = href;
      }
    }


    function openMatkulRps(matkulId) {

    function renderQuickLink(url, icon, label, extraClass = '') {
      const href = normalizeLink(url);
      if (!href) {
        return `
          <div class="flex flex-col items-center gap-1 opacity-40 cursor-not-allowed ${extraClass}">
            <span class="w-11 h-11 rounded-2xl bg-white border border-gray-100 shadow-sm flex items-center justify-center text-gray-400"><i data-lucide="${icon}" style="width:19px;height:19px"></i></span>
            <span class="text-[10px] font-medium text-gray-400">${escapeHtml(label)}</span>
          </div>`;
      }
      return `
        <button type="button" onclick="openExternalUrl('${escapeHtml(href)}')" class="flex flex-col items-center gap-1 group ${extraClass}">
          <span class="w-11 h-11 rounded-2xl bg-white border border-gray-100 shadow-sm flex items-center justify-center text-purple-600 group-hover:-translate-y-1 group-hover:shadow-md transition"><i data-lucide="${icon}" style="width:19px;height:19px"></i></span>
          <span class="text-[10px] font-medium text-gray-500 group-hover:text-purple-600 transition">${escapeHtml(label)}</span>
        </button>`;
    }

    function openDashboardMkGroups() {
      const overlay = document.getElementById('dashboard-mk-overlay');
      const panel = document.getElementById('dashboard-mk-panel');
      if (!overlay || !panel) return;
      [overlay, panel].forEach((el) => {
        if (!el.classList.contains('kc-body-modal')) el.classList.add('kc-body-modal');
        if (el.parentElement !== document.body) document.body.appendChild(el);
      });
      overlay.style.zIndex = '9000';
      overlay.style.pointerEvents = 'auto';
      panel.style.zIndex = '9010';
      panel.style.pointerEvents = 'auto';
      overlay.classList.remove('hidden');
      panel.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
      window.lucide?.createIcons?.();
    }

    function closeDashboardMkGroups() {
      document.getElementById('dashboard-mk-overlay')?.classList.add('hidden');
      document.getElementById('dashboard-mk-panel')?.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

      if (!modal.classList.contains('kc-body-modal')) modal.classList.add('kc-body-modal');

      modal.style.pointerEvents = 'auto';

      modal.classList.add('flex');

    function applySoftAnimations() {
      const content = document.getElementById('page-content');
      if (!content) return;

      content.classList.remove('page-enter');
      void content.offsetWidth;
      content.classList.add('page-enter');

      const selector = [
        '#page-content > div',
        '#page-content .grid > div',
        '#page-content .space-y-2 > div',
        '#page-content .space-y-3 > div',
        '#page-content .space-y-4 > div',
        '#page-content .bg-white.rounded-xl',
        '#page-content .bg-white.rounded-2xl'
      ].join(',');

      const seen = new Set();
      const items = Array.from(document.querySelectorAll(selector)).filter((el) => {
        if (seen.has(el) || el.closest('[id$="form-container"]') || el.closest('.kc-full-modal') || el.classList.contains('kc-body-modal')) return false;
        seen.add(el);
        return !el.classList.contains('hidden');
      });

      items.slice(0, 18).forEach((el, idx) => {
        el.classList.remove('soft-reveal');
        void el.offsetWidth;
        el.classList.add('soft-reveal');
        el.style.animationDelay = `${Math.min(idx * 35, 260)}ms`;
      });
    }

    function saveMatkul() {

      const startInput = document.getElementById('matkul-start-input')?.value || '08:00';
      const endInput = document.getElementById('matkul-end-input')?.value || '10:00';
      const startTime = toDotTime(startInput);

      const time = `${startTime} - ${endTime}`;

        return;
      }
      if (!startInput || !endInput || startInput >= endInput) {
        showToast('⚠️ Jam selesai harus lebih besar dari jam mulai');
        return;
      }
      if (editingMatkulId) {
        const mk = matkulData.find(m => m.id === editingMatkulId);
        if (mk) {
          mk.name = name;
          mk.dayOfWeek = dayOfWeek;
          mk.startTime = startTime;
          mk.endTime = endTime;
          mk.time = time;
          const override = getScheduleOverride(mk.id);

        matkulData.push(newMk);
        showToast('Mata kuliah berhasil ditambahkan');

      scheduleData = (Array.isArray(scheduleData) ? scheduleData : []).filter(item => matkulData.some(m => m.id === item.matkul));

      const current = getUser();
      if (!current) return;
      if (!newPw || !confirmPw) {
        showToast('⚠️ Isi password baru dan konfirmasi');
        return;
      }
      if (newPw.length < 3) {
        showToast('⚠️ Password minimal 3 karakter');
        return;
      }
      if (newPw !== confirmPw) {
        showToast('⚠️ Konfirmasi password tidak sama');
        return;
      }
      const master = USERS.find(u => u.username === current.username);
      if (master) {
        master.password = newPw;
        saveUsersData();
      }
      current.password = newPw;
      localStorage.setItem('kelascircle_user', JSON.stringify(current));
      const el = document.getElementById('profil-pw');
      if (el) el.textContent = profilPwVisible ? newPw : '••••••';
      toggleChangePasswordForm(false);
      showToast('Password berhasil diganti');
      if (currentPage === 'admin') renderPage(getUser());
    }

    function handleLogout() {
      localStorage.removeItem('kelascircle_user');
      removePresentationReminderFloat();
      currentPage = 'dashboard';
      render();
    }

    function updateActiveNav() {
      document.querySelectorAll('[data-nav]').forEach((btn) => {
        const isActive = btn.dataset.nav === currentPage;
        const type = btn.dataset.navType;
        if (type === 'sidebar') {
          btn.classList.remove('bg-purple-100', 'text-purple-700', 'text-gray-600', 'hover:bg-gray-100');
          btn.classList.add(...(isActive ? ['bg-purple-100', 'text-purple-700'] : ['text-gray-600', 'hover:bg-gray-100']));
        } else {
          btn.classList.remove('text-purple-600', 'text-gray-400');
          btn.classList.add(isActive ? 'text-purple-600' : 'text-gray-400');
        }
      });
    }

    function closeAllOpenForms() {
      ['modal-overlay','user-form-container','group-overlay','group-form-container','csv-overlay','csv-form-container','tugas-overlay','tugas-form-container','schedule-form-overlay','schedule-form-container','matkul-overlay','matkul-form'].forEach((id) => {
        document.getElementById(id)?.classList.add('hidden');
      });
    }

    function navigate(page) {
      currentPage = page;
      if (page === 'kelompok') {
        activeTab = 'pribadi';
        expandedMatkul = null;
      }
      if (page === 'admin') activeTab = 'pengguna';
      if (page === 'tugas') activeTugasTab = 'Belum';
      closeAllOpenForms();
      renderPage(getUser());
      updateActiveNav();
      window.lucide?.createIcons?.();
    }

    function render() {
      const user = getUser();
      if (user) renderApp(); else { removePresentationReminderFloat(); renderLogin(); }
    }

    function closeScheduleForm() {
      document.getElementById('schedule-form-container')?.classList.add('hidden');
      document.getElementById('schedule-form-overlay')?.classList.add('hidden');
      editingScheduleId = null;
    }

    function toggleScheduleForm() {
      closeScheduleForm();
    }

    function saveSchedule() {
      const matkul = document.getElementById('schedule-matkul')?.value || '';
      const pj1 = normalizeUserIdentifier(document.getElementById('schedule-pj1')?.value || '');
      const pj2 = normalizeUserIdentifier(document.getElementById('schedule-pj2')?.value || '');
      const mk = matkulData.find(m => m.id === matkul);

      if (!mk) {
        showToast('⚠️ Mata kuliah tidak ditemukan');
        return;
      }
      if (pj1 && pj2 && pj1 === pj2) {
        showToast('⚠️ PJ 1 dan PJ 2 tidak boleh sama');
        return;
      }

      const idx = scheduleData.findIndex(s => s.matkul === matkul);
      const record = {
        id: matkul,
        matkul,
        day: daysOfWeek[Number(mk.dayOfWeek) || 0],
        time: getMatkulTime(mk),
        pj1,
        pj2
      };
      if (idx !== -1) scheduleData[idx] = { ...scheduleData[idx], ...record };
      else scheduleData.push(record);
      setAppStorage('kelascircle_schedule', JSON.stringify(scheduleData));
      closeScheduleForm();
      renderPage(getUser());
      showToast('PJ jadwal berhasil disimpan');
    }

    function resetScheduleForm() {
      closeScheduleForm();
    }

    function editSchedule(matkulId) {
      const mk = matkulData.find(m => m.id === matkulId);
      if (!mk) {
        showToast('⚠️ Mata kuliah tidak ditemukan');
        return;
      }
      const override = getScheduleOverride(matkulId) || {};
      const matkulInput = document.getElementById('schedule-matkul');
      const infoName = document.getElementById('schedule-info-name');
      const infoTime = document.getElementById('schedule-info-time');
      if (matkulInput) matkulInput.value = matkulId;
      if (infoName) infoName.textContent = mk.name;
      if (infoTime) infoTime.textContent = `${daysOfWeek[Number(mk.dayOfWeek) || 0]} • ${getMatkulTime(mk)} WIB`;
      const pj1El = document.getElementById('schedule-pj1');
      const pj2El = document.getElementById('schedule-pj2');
      if (pj1El) pj1El.value = override.pj1 ? normalizeUserIdentifier(override.pj1) : '';
      if (pj2El) pj2El.value = override.pj2 ? normalizeUserIdentifier(override.pj2) : '';
      editingScheduleId = matkulId;
      document.getElementById('schedule-form-container')?.classList.remove('hidden');
      document.getElementById('schedule-form-overlay')?.classList.remove('hidden');
      window.lucide?.createIcons?.();
    }

    function deleteSchedule(id) {
      scheduleData = scheduleData.filter(x => x.matkul !== id && x.id !== id);
      setAppStorage('kelascircle_schedule', JSON.stringify(scheduleData));
      renderPage(getUser());
      showToast('PJ jadwal berhasil dikosongkan');
    }

    function groupScheduleByDay(data) {
      const grouped = {};
      data.forEach(s => {
        if (!grouped[s.day]) grouped[s.day] = [];
        grouped[s.day].push(s);
      });
      return grouped;
    }

    function getMatkulName(id) {
      const m = matkulData.find(x => x.id === id);
      return m ? m.name : id;
    }

    let currentCsvType = '';

    function openCsvForm(type) {
      currentCsvType = type;
      const formats = {
        pengguna: 'name,username,password,role\nAbu,abu,123,User\nSari,sari,123,Admin Tambahan',
        kelompok: 'matkulId,name,members,topic,date,status\ntafsir,KELOMPOK 4,Joni;Joko;Juliana,Tafsir Kontemporer,15 Mei 2026,Belum Selesai'
      };

      document.getElementById('csv-title').textContent = `Import ${type.charAt(0).toUpperCase() + type.slice(1)}`;
      document.getElementById('csv-format').textContent = formats[type];
      document.getElementById('csv-input').value = '';
      document.getElementById('csv-form-container').classList.remove('hidden');
      document.getElementById('csv-overlay').classList.remove('hidden');
    }

    function closeCsvForm() {
      document.getElementById('csv-form-container').classList.add('hidden');
      document.getElementById('csv-overlay').classList.add('hidden');
      currentCsvType = '';
    }

    function openGroupForm() {
      if (!matkulData.length) {
        showToast('⚠️ Tambahkan mata kuliah dulu di Setting');
        return;
      }
      editingGroupMatkul = null;
      editingGroupId = null;
      document.getElementById('group-overlay').classList.remove('hidden');
      document.getElementById('group-form-container').classList.remove('hidden');
      document.getElementById('group-form-title').textContent = 'Tambah Kelompok';
      document.getElementById('group-input-matkul').value = '';
      document.getElementById('group-input-name').value = '';
      document.getElementById('group-input-topic').value = '';
      document.getElementById('group-input-members').value = '';
      document.getElementById('group-input-date').value = '';
      document.getElementById('group-input-status').value = '';
      document.getElementById('group-csv-matkul').value = '';
    }

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      if (lines.length < 2) throw new Error('CSV minimal harus 2 baris (header + data)');
      
      const headers = lines[0].split(',').map(h => h.trim());
      const data = [];
      
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = lines[i].split(',').map(v => v.trim());
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = values[idx] || '';
        });
        data.push(obj);
      }
      
      return data;
    }

    function importCsv() {
      try {
        const csvText = document.getElementById('csv-input').value;
        if (!csvText.trim()) {
          showToast('⚠️ Paste CSV data terlebih dahulu');
          return;
        }

        const data = parseCSV(csvText);
        let imported = 0;

        if (currentCsvType === 'pengguna') {
          data.forEach(row => {
            if (row.name && row.username && row.password && row.role) {
              const exists = USERS.find(u => u.username === row.username);
              if (!exists) {
                USERS.push({
                  name: row.name,
                  username: row.username,
                  password: row.password,
                  role: row.role,
                  photo: ''
                });
                saveUsersData();
                imported++;
              }
            }
          });
        } else if (currentCsvType === 'kelompok') {
          data.forEach(row => {
            if (row.matkulId && row.name) {
              const matkul = row.matkulId;
              if (!groupsData[matkul]) groupsData[matkul] = [];
              
              const members = row.members ? row.members.split(';').map(m => normalizeUserIdentifier(m.trim())).filter(Boolean) : [];
              const lastId = groupsData[matkul].length > 0 
                ? Math.max(...groupsData[matkul].map(g => g.id)) 
                : 0;

              groupsData[matkul].push({
                id: lastId + 1,
                name: row.name,
                members: members,
                topic: row.topic || '',
                date: row.date || '',
                status: row.status || 'Belum Selesai'
              });
              imported++;
            }
          });
          setAppStorage('kelascircle_groups', JSON.stringify(groupsData));
        }

        if (imported > 0) {
          showToast(`✅ ${imported} ${currentCsvType} berhasil diimport`);
          closeCsvForm();
          renderPage(getUser());
          window.lucide?.createIcons?.();
        } else {
          showToast('⚠️ Tidak ada data valid yang diimport');
        }
      } catch (error) {
        showToast(`❌ Error: ${error.message}`);
      }
    }

    if (window.elementSdk && typeof window.elementSdk.init === 'function') {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          render();
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['app_title', config.app_title || defaultConfig.app_title],
          ['app_subtitle', config.app_subtitle || defaultConfig.app_subtitle]
        ])
      });
    }

    document.addEventListener('click', (event) => {
      const menu = document.getElementById('profile-menu');
      if (!menu || menu.classList.contains('hidden')) return;
      if (!event.target.closest('#profile-menu') && !event.target.closest('[onclick^="toggleProfileMenu"]')) {
        closeProfileMenu();
      }
    });

    // =========================================================================
    // INITIALIZATION & BOOT SEQUENCE (ASYNC + REALTIME)
    // =========================================================================
    async function bootApp() {
      // 1. Tampilkan loading overlay
      const loadingEl = document.getElementById('global-loading');
      
      // 2. Tarik data dari Google Sheets (jika ada)
      await fetchDatabaseFromGAS();
      
      // 3. Pastikan data default starter tersedia jika belum ada apapun
      ensureCleanStarterData();
      
      // 4. Inisialisasi state ke dalam memory dari local storage
      USERS = getUsersData();
      matkulData = getMatkulData();
      initGroupsData();
      initScheduleData();
      initTugasData();
      
      // 5. Hilangkan loading overlay & render aplikasi
      loadingEl.style.opacity = '0';
      setTimeout(() => {
        loadingEl.style.display = 'none';
        render();
      }, 300);
    }

    // Jalankan aplikasi
    bootApp();

  </script></body>
